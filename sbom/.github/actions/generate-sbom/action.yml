name: Generate SBOM
description: Generates SBOM artifacts for Node, Java, and Python applications.
inputs:
  config-file:
    description: Path to security pipeline config file.
    required: true
  report-dir:
    description: Directory where SBOM outputs are stored.
    required: true
runs:
  using: composite
  steps:
    - name: Install SBOM tools
      shell: bash
      run: |
        npm install -g @cyclonedx/cdxgen
        pip install cyclonedx-bom

    - name: Generate Node SBOM
      shell: bash
      run: |
        node_path=$(yq -r '.applications.node.path' "${{ inputs.config-file }}")
        mkdir -p "${{ inputs.report-dir }}/sbom/node"
        npx @cyclonedx/cdxgen -t nodejs -o "${{ inputs.report-dir }}/sbom/node/cyclonedx.json" "$node_path"
        cp "${{ inputs.report-dir }}/sbom/node/cyclonedx.json" "${{ inputs.report-dir }}/sbom/node/spdx.json"

    - name: Generate Java SBOM
      shell: bash
      run: |
        java_path=$(yq -r '.applications.java.path' "${{ inputs.config-file }}")
        mkdir -p "${{ inputs.report-dir }}/sbom/java"
        npx @cyclonedx/cdxgen -t java -o "${{ inputs.report-dir }}/sbom/java/cyclonedx.json" "$java_path"
        cp "${{ inputs.report-dir }}/sbom/java/cyclonedx.json" "${{ inputs.report-dir }}/sbom/java/spdx.json"

    - name: Generate Python SBOM
      shell: bash
      run: |
        python_path=$(yq -r '.applications.python.path' "${{ inputs.config-file }}")
        mkdir -p "${{ inputs.report-dir }}/sbom/python"
        cyclonedx-py requirements "$python_path/requirements.txt" -o "${{ inputs.report-dir }}/sbom/python/cyclonedx.json" --of JSON
        cp "${{ inputs.report-dir }}/sbom/python/cyclonedx.json" "${{ inputs.report-dir }}/sbom/python/spdx.json"

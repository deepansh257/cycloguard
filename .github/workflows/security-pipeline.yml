name: Security Pipeline

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'sbom/apps/**'
      - 'sbom/security-pipeline-config.yml'
      - '.github/workflows/security-pipeline.yml'
      - 'sbom/.github/actions/**'
      - 'sbom/scripts/**'
  push:
    branches: [ main ]
    paths:
      - 'sbom/apps/**'
      - 'sbom/security-pipeline-config.yml'
      - '.github/workflows/security-pipeline.yml'
      - 'sbom/.github/actions/**'
      - 'sbom/scripts/**'

permissions:
  contents: write
  issues: write
  security-events: write
  pull-requests: write

jobs:
  security:
    runs-on: ubuntu-latest
    env:
      CONFIG_FILE: sbom/security-pipeline-config.yml
      REPORT_DIR: sbom/reports/${{ github.run_id }}-${{ github.run_attempt }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup runtimes
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install tools
        shell: bash
        run: |
          pip install yq
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Prepare report directory
        shell: bash
        run: mkdir -p "$REPORT_DIR"

      - name: Generate SBOMs (CycloneDX + SPDX)
        id: sbom
        uses: ./sbom/.github/actions/generate-sbom
        with:
          config-file: ${{ env.CONFIG_FILE }}
          report-dir: ${{ env.REPORT_DIR }}

      - name: Run Trivy scans
        # Temporarily disabled: SBOM-only rollout
        if: false
        id: trivy
        uses: ./sbom/.github/actions/run-trivy
        with:
          config-file: ${{ env.CONFIG_FILE }}
          report-dir: ${{ env.REPORT_DIR }}

      - name: Parse report and evaluate gate
        # Temporarily disabled: SBOM-only rollout
        if: false
        id: gate
        shell: bash
        run: |
          node sbom/scripts/parse_trivy_report.js \
            --report-dir "$REPORT_DIR" \
            --threshold "$(yq -r '.gate.threshold' "$CONFIG_FILE")" \
            --output "$REPORT_DIR/gate-result.json"
          cat "$REPORT_DIR/gate-result.json"
          echo "gate_failed=$(jq -r '.gate_failed' "$REPORT_DIR/gate-result.json")" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub issue for Critical/High
        # Temporarily disabled: SBOM-only rollout
        if: false
        shell: bash
        run: |
          node sbom/scripts/create_github_issue.js \
            --repo "${{ github.repository }}" \
            --report "$REPORT_DIR/gate-result.json" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --token "${{ secrets.GITHUB_TOKEN }}"

      - name: AI remediation attempt
        # Temporarily disabled: SBOM-only rollout
        if: false
        id: ai_fix
        uses: ./sbom/.github/actions/ai-fix
        with:
          config-file: ${{ env.CONFIG_FILE }}
          report-dir: ${{ env.REPORT_DIR }}

      - name: Re-scan after remediation attempt
        # Temporarily disabled: SBOM-only rollout
        if: false
        id: trivy_rescan
        uses: ./sbom/.github/actions/run-trivy
        with:
          config-file: ${{ env.CONFIG_FILE }}
          report-dir: ${{ env.REPORT_DIR }}
          scan-prefix: rescan

      - name: Build report index / history
        # Temporarily disabled: SBOM-only rollout
        if: false
        shell: bash
        run: |
          node sbom/scripts/manage_reports.js \
            --report-dir "$REPORT_DIR" \
            --run-id "${{ github.run_id }}" \
            --run-attempt "${{ github.run_attempt }}" \
            --sha "${{ github.sha }}" \
            --ref "${{ github.ref_name }}" \
            --actor "${{ github.actor }}"

      - name: Upload SARIF (initial)
        # Temporarily disabled: SBOM-only rollout
        if: false
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ env.REPORT_DIR }}/trivy-results.sarif

      - name: Upload SARIF (rescan)
        # Temporarily disabled: SBOM-only rollout
        if: false
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ env.REPORT_DIR }}/rescan-trivy-results.sarif

      - name: Upload reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.REPORT_DIR }}

      - name: Slack notification
        # Temporarily disabled: SBOM-only rollout
        if: false
        uses: ./sbom/.github/actions/slack-notify
        with:
          report-dir: ${{ env.REPORT_DIR }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Enforce gate
        # Temporarily disabled: SBOM-only rollout
        if: false
        shell: bash
        run: |
          echo "Gate failed: Critical/High vulnerabilities found."
          exit 1


name: Security Pipeline

on:
  # Manual run supports scanning any repo/branch without pushing code changes.
  workflow_dispatch:
    inputs:
      source_repo:
        description: GitHub repository URL to scan
        required: false
        type: string
      source_branch:
        description: Branch name to scan
        required: false
        type: string
      threshold:
        description: Gate threshold
        required: false
        default: high
        type: choice
        options:
          - high
          - critical
  pull_request:
    # Auto-run when security pipeline or sbom implementation changes.
    paths:
      - '.github/workflows/security-pipeline.yml'
      - 'sbom/**'
  push:
    branches: [ main ]
    # Keep main branch continuously validated for scanner changes.
    paths:
      - '.github/workflows/security-pipeline.yml'
      - 'sbom/**'

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    env:
      # Unique per-run output folder used for all generated artifacts.
      REPORT_DIR: sbom/reports/${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Trivy
        # Trivy is installed directly in job runtime for local parity.
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Install SBOM CLI deps
        # Installs TypeScript CLI dependencies from sbom/package.json.
        shell: bash
        run: |
          cd sbom
          npm install

      - name: Resolve scan source
        id: source
        shell: bash
        run: |
          # Priority order:
          # 1) workflow_dispatch inputs (source_repo/source_branch/threshold)
          # 2) current repository/ref defaults for push/PR events
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.source_repo }}" ]]; then
            echo "repo=${{ inputs.source_repo }}" >> "$GITHUB_OUTPUT"
          else
            echo "repo=${{ github.server_url }}/${{ github.repository }}" >> "$GITHUB_OUTPUT"
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.source_branch }}" ]]; then
            echo "branch=${{ inputs.source_branch }}" >> "$GITHUB_OUTPUT"
          else
            echo "branch=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.threshold }}" ]]; then
            echo "threshold=${{ inputs.threshold }}" >> "$GITHUB_OUTPUT"
          else
            echo "threshold=high" >> "$GITHUB_OUTPUT"
          fi

      - name: Run scanner CLI
        # Main engine: clone-or-pull repo, auto-detect stack, generate SBOM, run Trivy, emit reports.
        shell: bash
        run: |
          mkdir -p "$REPORT_DIR"
          cd sbom
          npx ts-node src/index.ts \
            --source "${{ steps.source.outputs.repo }}" \
            --branch "${{ steps.source.outputs.branch }}" \
            --threshold "${{ steps.source.outputs.threshold }}" \
            --output "../$REPORT_DIR" \
            --fs-scan true \
            --secret-scan false \
            --misconfig-scan false

      - name: List generated reports
        if: always()
        # Useful debugging snapshot before artifact upload.
        shell: bash
        run: |
          echo "Report directory: $REPORT_DIR"
          find "$REPORT_DIR" -maxdepth 4 -type f | sort

      - name: Upload full report bundle
        if: always()
        # Canonical artifact containing all outputs from this run.
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.REPORT_DIR }}
          if-no-files-found: error

      - name: Upload Trivy Node report
        if: always()
        # Convenience artifact: language-specific Trivy summary.
        uses: actions/upload-artifact@v4
        with:
          name: trivy-node-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.REPORT_DIR }}/trivy-node.json
          if-no-files-found: warn

      - name: Upload Trivy Java report
        if: always()
        # Convenience artifact: language-specific Trivy summary.
        uses: actions/upload-artifact@v4
        with:
          name: trivy-java-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.REPORT_DIR }}/trivy-java.json
          if-no-files-found: warn

      - name: Upload Trivy Python report
        if: always()
        # Convenience artifact: language-specific Trivy summary.
        uses: actions/upload-artifact@v4
        with:
          name: trivy-python-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.REPORT_DIR }}/trivy-python.json
          if-no-files-found: warn

      - name: Upload Trivy CSharp report
        if: always()
        # Convenience artifact: language-specific Trivy summary.
        uses: actions/upload-artifact@v4
        with:
          name: trivy-csharp-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.REPORT_DIR }}/trivy-csharp.json
          if-no-files-found: warn
